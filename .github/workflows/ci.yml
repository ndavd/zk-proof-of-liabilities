name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  circuits:
    name: Circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: 1.0.0-beta.19
      - name: Run Nargo execute
        run: nargo execute
      - name: Run Nargo tests
        run: nargo test
      - name: Run Nargo fmt
        run: nargo fmt --check
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: 1.5.1
      - name: Run Forge build
        run: forge build
      - name: Run Forge tests
        run: forge test
      - name: Run Forge fmt
        run: forge fmt --check
